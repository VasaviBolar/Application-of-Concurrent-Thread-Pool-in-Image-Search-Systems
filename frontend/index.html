<!DOCTYPE html>
<html>
<head>
    <title>AI Image Search</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        .grid {
            margin-top: 20px;
        }

        img {
            width: 200px;
            height: 200px;
            margin: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🔍 AI Image Search</h1>

<!-- SEARCH -->
<input type="text" id="query" placeholder="Search (e.g. cat)">
<button onclick="search()">Search</button>

<br><br>

<!-- UPLOAD -->
<input type="file" id="fileInput" multiple>
<button onclick="upload()">Upload Image</button>

<!-- RESULTS -->
<div id="results" class="grid"></div>

<script>

async function upload() {

    const files = document.getElementById("fileInput").files;

    if (files.length === 0) {
        alert("Select images first");
        return;
    }

    for (const file of files) {

        await fetch("http://localhost:8080/upload", {
            method: "POST",
            body: file
        });

        console.log("Uploaded:", file.name);
    }

    alert("All images uploaded!");
}

async function search() {
    const query = document.getElementById("query").value;

    const res = await fetch(`http://localhost:8080/search?q=${query}`);
    const data = await res.json();

    const div = document.getElementById("results");
    div.innerHTML = "";

    data.results.forEach(path => {
        const fileName = path.split(/[/\\]/).pop();

        const img = document.createElement("img");
        img.src = "http://localhost:8080/images/" + fileName;

        div.appendChild(img);
    });
}

</script>

</body>
</html>
